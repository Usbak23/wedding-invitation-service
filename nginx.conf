upstream app_backend {
    server app:3000;
}

server {
    listen 80;
    server_name wi-api.amtechsolutions.my.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wi-api.amtechsolutions.my.id;

    ssl_certificate /etc/letsencrypt/live/wi-api.amtechsolutions.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wi-api.amtechsolutions.my.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 5M;

    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /uploads/ {
        proxy_pass http://app_backend/uploads/;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
